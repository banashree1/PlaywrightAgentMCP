name: "Playwright CI/CD Pipeline"

on:
  # Trigger on push to main branch
  push:
    branches: [ main, develop ]
  
  # Trigger on pull requests
  pull_request:
    branches: [ main ]
  
  # Allow manual trigger
  workflow_dispatch:
  
  # Schedule to run daily at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'

jobs:
  test:
    name: "Run Playwright Tests"
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        browser: [chromium]
    
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4
      
      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      
      - name: "Install Dependencies"
        run: npm ci
      
      - name: "Install Playwright Browsers"
        run: npx playwright install --with-deps
      
      - name: "Run Playwright Tests"
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: true
      
      - name: "Upload Test Results"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "playwright-report-${{ matrix.browser }}"
          path: playwright-report/
          retention-days: 7
      
      - name: "Upload Test Artifacts"
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: "test-results-${{ matrix.browser }}"
          path: test-results/
          retention-days: 7

  deploy-reports:
    name: "Deploy Test Reports"
    needs: test
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
    
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Download All Artifacts"
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: "Create Combined Report"
        run: |
          mkdir -p combined-report
          echo "Test Results" > combined-report/index.html
          echo "<h1>Playwright Test Results</h1>" >> combined-report/index.html
          echo "<p>Generated on: $(date)</p>" >> combined-report/index.html
          
          for browser in chromium; do
            if [ -d "artifacts/playwright-report-$browser" ]; then
              echo "<h2>$browser Results</h2>" >> combined-report/index.html
              cp -r artifacts/playwright-report-$browser combined-report/$browser
              echo "<a href=\"./$browser/index.html\">View $browser Report</a><br>" >> combined-report/index.html
            fi
          done
      
      - name: "Deploy to GitHub Pages"
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: combined-report
          publish_branch: gh-pages
      
      - name: "Notify Completion"
        run: |
          echo "Pipeline completed successfully!"
          echo "Test reports deployed to the gh-pages branch."